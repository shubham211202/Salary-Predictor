<!DOCTYPE html>
<html>
<head>
    <title>Salary Predictor</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
        }
        button {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:disabled {
            background-color: gray;
            cursor: not-allowed;
        }
        input {
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>💼 Salary Prediction App</h2>

<input type="number" id="exp" placeholder="Enter years of experience">
<br>
<button id="predictBtn" onclick="predictSalary()">Predict</button>

<h3 id="result"></h3>

<script>
function predictSalary() {
    let exp = document.getElementById("exp").value;
    let result = document.getElementById("result");
    let button = document.getElementById("predictBtn");

    // Input validation
    if (!exp) {
        alert("Please enter experience");
        return;
    }

    if (exp < 0) {
        alert("Experience cannot be negative");
        return;
    }

    // Disable button while processing
    button.disabled = true;

    // Show loading message
    result.innerText = "⏳ Waking server... please wait";

    fetch("http://127.0.0.1:5000/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            experience: parseFloat(exp)
        })
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Server error");
        }
        return res.json();
    })
    .then(data => {
        if (data.error) {
            result.innerText = "❌ " + data.error;
        } else {
            result.innerText =
                "💰 Predicted Salary: ₹ " + Number(data.predicted_salary).toLocaleString();
        }
    })
    .catch(err => {
        result.innerText = "❌ Error connecting to server";
    })
    .finally(() => {
        // Enable button again
        button.disabled = false;
    });
}
</script>

</body>
</html>
